<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home - Classroom</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:40px;
}

h1{
    text-align:center;
}

.folder{
    margin-top:30px;
}

.folderTitle{
    font-size:20px;
    border-bottom:1px solid #444;
    cursor:pointer;
    user-select:none;
}

.subTitle{
    margin-top:15px;
    margin-left:20px;
    font-size:16px;
    border-bottom:1px solid #333;
    padding-bottom:3px;
    cursor:pointer;
    user-select:none;
}

.folderContent{
    margin-top:5px;
}

.subContent{
    margin-left:20px;
}

a{
    display:block;
    padding:4px 0;
    color:#4da6ff;
    text-decoration:none;
    font-size:16px;
}

.sub{
    margin-left:20px;
    font-size:14px;
}

a:hover{
    text-decoration:underline;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<h1>Pwnmaster99's games</h1>
<div id="list">Loading...</div>

<script>

const username = "pwnmaster99";
const repo = username + ".github.io";

async function loadGames(){

    const url = `https://api.github.com/repos/${username}/${repo}/git/trees/main?recursive=1`;
    const response = await fetch(url);
    const data = await response.json();

    const groups = {};
    const uncategorized = [];

    data.tree.forEach(file => {

        if(file.path.endsWith("index.html")){

            let folder = file.path.replace("/index.html","");
            if(folder === "") return;

            const parts = folder.split("/");

            if(parts.length === 1){
                uncategorized.push({
                    name: parts[0],
                    path: folder
                });
                return;
            }

            const parent = parts[0];

            if(parts.length === 2){

                if(!groups[parent]) groups[parent] = {games:[], subs:{}};

                groups[parent].games.push({
                    name: parts[1],
                    path: folder
                });

            }else{

                const sub = parts[1];

                if(!groups[parent]) groups[parent] = {games:[], subs:{}};
                if(!groups[parent].subs[sub]) groups[parent].subs[sub] = [];

                groups[parent].subs[sub].push({
                    name: parts[parts.length-1],
                    path: folder
                });

            }

        }

    });

    const container = document.getElementById("list");
    container.innerHTML = "";

    function makeFolder(titleText, contentBuilder){

        const wrapper = document.createElement("div");
        wrapper.className = "folder";

        const title = document.createElement("div");
        title.className = "folderTitle";
        title.textContent = "▼ " + titleText;

        const content = document.createElement("div");
        content.className = "folderContent";

        title.onclick = ()=>{
            content.classList.toggle("hidden");
            title.textContent = (content.classList.contains("hidden")?"► ":"▼ ") + titleText;
        };

        contentBuilder(content);

        wrapper.appendChild(title);
        wrapper.appendChild(content);

        return wrapper;
    }

    function makeSub(titleText, contentBuilder){

        const title = document.createElement("div");
        title.className = "subTitle";
        title.textContent = "▼ " + titleText;

        const content = document.createElement("div");
        content.className = "subContent";

        title.onclick = ()=>{
            content.classList.toggle("hidden");
            title.textContent = (content.classList.contains("hidden")?"► ":"▼ ") + titleText;
        };

        contentBuilder(content);

        const wrapper = document.createElement("div");
        wrapper.appendChild(title);
        wrapper.appendChild(content);

        return wrapper;
    }

    if(uncategorized.length > 0){

        const section = makeFolder("Uncategorized", (content)=>{

            uncategorized.sort((a,b)=>a.name.localeCompare(b.name));

            uncategorized.forEach(game=>{
                const link = document.createElement("a");
                link.href = "/" + game.path;
                link.textContent = game.name;
                content.appendChild(link);
            });

        });

        container.appendChild(section);

    }

    Object.keys(groups).sort().forEach(parent=>{

        const section = makeFolder(parent, (content)=>{

            groups[parent].games.sort((a,b)=>a.name.localeCompare(b.name));

            groups[parent].games.forEach(game=>{
                const link = document.createElement("a");
                link.href = "/" + game.path;
                link.textContent = game.name;
                content.appendChild(link);
            });

            Object.keys(groups[parent].subs).sort().forEach(sub=>{

                const subSection = makeSub(sub,(subContent)=>{

                    groups[parent].subs[sub].sort((a,b)=>a.name.localeCompare(b.name));

                    groups[parent].subs[sub].forEach(game=>{
                        const link = document.createElement("a");
                        link.href = "/" + game.path;
                        link.textContent = game.name;
                        link.classList.add("sub");
                        subContent.appendChild(link);
                    });

                });

                content.appendChild(subSection);

            });

        });

        container.appendChild(section);

    });

}

loadGames();

</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
